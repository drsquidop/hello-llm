<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" rx="12" fill="#0d1117"/>

  <!-- GCP boundary -->
  <rect x="188" y="28" width="720" height="324" rx="14" fill="#0f1319" stroke="#4285f4" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="548" y="54" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">  Google Cloud Platform</text>

  <!-- GKE boundary -->
  <rect x="378" y="70" width="362" height="264" rx="10" fill="#111827" stroke="#818cf8" stroke-width="2"/>
  <text x="559" y="96" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="bold">ˆ  Google Kubernetes Engine</text>

  <!-- Hugging Face -->
  <rect x="22" y="167" width="128" height="58" rx="29" fill="#ff9e64" stroke="#e8700a" stroke-width="2"/>
  <text x="86" y="193" text-anchor="middle" fill="#1a1a2e" font-size="11.5" font-weight="bold">Hugging Face</text>
  <text x="86" y="208" text-anchor="middle" fill="#3d2800" font-size="10">Model Hub</text>

  <!-- GCS -->
  <rect x="218" y="167" width="128" height="58" rx="8" fill="#7dcfff" stroke="#2a8cc4" stroke-width="2"/>
  <text x="282" y="192" text-anchor="middle" fill="#0a2540" font-size="11.5" font-weight="bold">GCS Archive</text>
  <text x="282" y="207" text-anchor="middle" fill="#0a2540" font-size="10">Coldline Storage</text>

  <!-- GPU Node Pool -->
  <rect x="402" y="112" width="140" height="52" rx="8" fill="#bb9af7" stroke="#7c3aed" stroke-width="2"/>
  <text x="472" y="135" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="bold">GPU Node Pool</text>
  <text x="472" y="150" text-anchor="middle" fill="#2d1a4e" font-size="10">NVIDIA H200 / B200</text>

  <!-- vLLM Pod -->
  <rect x="402" y="228" width="140" height="52" rx="8" fill="#9ece6a" stroke="#4c8c0f" stroke-width="2"/>
  <text x="472" y="251" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="bold">vLLM Serving</text>
  <text x="472" y="266" text-anchor="middle" fill="#1a3d0a" font-size="10">Pod</text>

  <!-- K8s Service -->
  <rect x="592" y="170" width="130" height="52" rx="8" fill="#73daca" stroke="#2d9d8f" stroke-width="2"/>
  <text x="657" y="193" text-anchor="middle" fill="#0a2540" font-size="11" font-weight="bold">K8s Service</text>
  <text x="657" y="208" text-anchor="middle" fill="#0a2540" font-size="10">LoadBalancer</text>

  <!-- REST API -->
  <rect x="780" y="167" width="120" height="58" rx="8" fill="#e0af68" stroke="#d08c2e" stroke-width="2"/>
  <text x="840" y="192" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="bold">REST API</text>
  <text x="840" y="207" text-anchor="middle" fill="#3d2800" font-size="10">/v1/completions</text>

  <!-- Chat Page -->
  <rect x="955" y="167" width="110" height="58" rx="8" fill="#f7768e" stroke="#c53b53" stroke-width="2"/>
  <text x="1010" y="192" text-anchor="middle" fill="#1a1a2e" font-size="11" font-weight="bold">Chat Page</text>
  <text x="1010" y="207" text-anchor="middle" fill="#3d0a1a" font-size="10">Web UI</text>

  <!-- User -->
  <circle cx="1140" cy="196" r="32" fill="#c0caf5" stroke="#7aa2f7" stroke-width="2"/>
  <text x="1140" y="200" text-anchor="middle" fill="#1a1b26" font-size="12" font-weight="bold">User</text>

  <!-- ===== Arrows ===== -->

  <!-- HF ’ GCS -->
  <line x1="150" y1="196" x2="216" y2="196" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="183" y="189" text-anchor="middle" fill="#64748b" font-size="9" font-style="italic">download</text>

  <!-- GCS ’ GPU Node Pool -->
  <path d="M346,182 C372,152 392,140 400,137" fill="none" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="362" y="150" text-anchor="middle" fill="#64748b" font-size="9" font-style="italic">load</text>

  <!-- GPU Node Pool ’ vLLM -->
  <line x1="472" y1="164" x2="472" y2="226" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="494" y="200" fill="#64748b" font-size="9" font-style="italic">schedule</text>

  <!-- vLLM ’ K8s Service -->
  <path d="M542,246 C568,222 582,208 590,200" fill="none" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="554" y="238" text-anchor="middle" fill="#64748b" font-size="9" font-style="italic">expose</text>

  <!-- K8s Service ’ REST API -->
  <line x1="722" y1="196" x2="778" y2="196" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="750" y="189" text-anchor="middle" fill="#64748b" font-size="9" font-style="italic">route</text>

  <!-- REST API ’ Chat Page -->
  <line x1="900" y1="196" x2="953" y2="196" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="927" y="189" text-anchor="middle" fill="#64748b" font-size="9" font-style="italic">serve</text>

  <!-- User ’ Chat Page -->
  <line x1="1108" y1="196" x2="1067" y2="196" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="1088" y="189" text-anchor="middle" fill="#64748b" font-size="9" font-style="italic">interact</text>
</svg>
